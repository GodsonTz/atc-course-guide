<style>
:root {
  --green: #0a3d2e;
  --green-mid: #1D9E75;
  --green-light: #E1F5EE;
  --green-accent: #5DCAA5;
  --amber: #f59e0b;
  --surface: #f8faf9;
  --card: #ffffff;
  --text: #0d1f1a;
  --text-muted: #5a7a70;
  --border: rgba(10,61,46,0.1);
  --border-strong: rgba(10,61,46,0.2);
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--surface);
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
}

/* HEADER */
.app-header {
  background: var(--green);
  padding: env(safe-area-inset-top, 0) 0 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  padding: 1rem 1.25rem 0.75rem;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1rem;
}
.app-icon {
  width: 42px; height: 42px;
  background: var(--green-accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--green);
  letter-spacing: -0.5px;
  flex-shrink: 0;
}
.header-titles { flex: 1; }
.app-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.3px;
}
.app-subtitle { font-size: 12px; color: var(--green-accent); margin-top: 1px; }

.install-hint {
  display: none;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  border: 0.5px solid rgba(255,255,255,0.15);
}
.install-hint.show { display: flex; }
.install-hint svg { width: 14px; height: 14px; fill: var(--green-accent); }

/* SEARCH */
.search-wrap {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  border: 0.5px solid rgba(255,255,255,0.12);
}
.search-wrap svg { width: 16px; height: 16px; fill: var(--green-accent); flex-shrink: 0; }
.search-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  padding: 11px 0;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.4); }

/* FILTERS */
.filters-scroll {
  display: flex;
  gap: 8px;
  padding: 0.75rem 1.25rem;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--green);
}
.filters-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 6px 16px;
  border-radius: 99px;
  border: 0.5px solid rgba(255,255,255,0.2);
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  background: transparent;
  transition: all 0.15s;
}
.filter-chip.active {
  background: var(--green-accent);
  border-color: var(--green-accent);
  color: var(--green);
  font-weight: 600;
}

/* STATS BAR */
.stats-bar {
  padding: 0.75rem 1.25rem;
  font-size: 12px;
  color: var(--text-muted);
  border-bottom: 0.5px solid var(--border);
}
.stats-bar span { font-weight: 500; color: var(--green-mid); }

/* COURSE LIST */
.course-list {
  padding: 1rem 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 6rem;
}

/* CARD */
.course-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 0.5px solid var(--border);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.course-card.open {
  border-color: var(--green-mid);
  box-shadow: 0 0 0 3px rgba(29,158,117,0.08);
}

.card-summary {
  padding: 1rem 1.25rem;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.dept-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  margin-top: 2px;
}
.card-text { flex: 1; min-width: 0; }
.dept-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 4px;
}
.course-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
}
.course-meta {
  display: flex;
  gap: 10px;
  font-size: 11px;
  color: var(--text-muted);
}
.meta-pill {
  display: flex;
  align-items: center;
  gap: 3px;
}
.chevron-wrap {
  display: flex;
  align-items: center;
  padding-top: 10px;
}
.chevron {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--green-light);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.25s, background 0.2s;
}
.open .chevron { transform: rotate(180deg); background: var(--green-mid); }
.chevron svg { width: 10px; height: 10px; }
.chevron svg path { stroke: var(--green-mid); }
.open .chevron svg path { stroke: #fff; }

/* SUBJECTS PANEL */
.subjects-panel {
  display: none;
  border-top: 0.5px solid var(--border);
}
.open .subjects-panel { display: block; }

.semester-block { padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border); }
.semester-block:last-child { border-bottom: none; }
.semester-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--green-mid);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.semester-label::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--border);
}

.subject-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 0.5px solid var(--border);
}
.subject-row:last-child { border-bottom: none; }
.subject-num {
  font-size: 10px;
  color: var(--text-muted);
  width: 18px;
  text-align: right;
  flex-shrink: 0;
}
.subject-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green-accent);
  flex-shrink: 0;
}
.subject-info { flex: 1; }
.subject-name { font-size: 13px; color: var(--text); line-height: 1.3; }
.subject-code { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

/* ENTRY REQUIREMENTS */
.entry-section {
  margin: 0 1.25rem 1rem;
  background: var(--green-light);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.entry-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--green-mid);
  margin-bottom: 5px;
}
.entry-text { font-size: 12px; color: var(--text); line-height: 1.6; }

/* EMPTY STATE */
.empty-state {
  display: none;
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 36px; margin-bottom: 1rem; }
.empty-state p { font-size: 14px; }

/* BOTTOM NAV */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 0.5px solid var(--border);
  padding: 12px 1.25rem;
  padding-bottom: env(safe-area-inset-bottom, 12px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}
.bottom-label {
  font-size: 11px;
  color: var(--text-muted);
}
.bottom-label strong { color: var(--green-mid); }
.share-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
}
.share-btn svg { width: 14px; height: 14px; fill: #fff; }

/* DEPT COLORS */
.dept-ICT { background: #E6F1FB; color: #185FA5; }
.dept-ICT .dept-icon { background: #E6F1FB; }
.dept-Civil { background: var(--green-light); color: var(--green-mid); }
.dept-Civil .dept-icon { background: var(--green-light); }
.dept-Electrical { background: #FAEEDA; color: #854F0B; }
.dept-Electrical .dept-icon { background: #FAEEDA; }
.dept-Mechanical { background: #FBEAF0; color: #993556; }
.dept-Mechanical .dept-icon { background: #FBEAF0; }
.dept-Transport { background: #EEEDFE; color: #534AB7; }
.dept-Transport .dept-icon { background: #EEEDFE; }

@media (max-width: 480px) {
  .app-title { font-size: 16px; }
  .course-name { font-size: 14px; }
}
</style>
</head>

const DEPTS = ["Zote", "ICT", "Civil", "Electrical", "Mechanical", "Transport"];
let activeFilter = "Zote";
let openCards = new Set();
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBtn').classList.remove('show');
    });
  }
}

function shareApp() {
  if (navigator.share) {
    navigator.share({
      title: 'ATC Course Explorer',
      text: 'Tazama kozi na masomo ya Arusha Technical College!',
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert('Link imenakiliwa!');
  }
}

function renderFilters() {
  document.getElementById('filterRow').innerHTML = DEPTS.map(d =>
    `<button class="filter-chip${d===activeFilter?' active':''}" onclick="setFilter('${d}')">${d}</button>`
  ).join('');
}

function setFilter(d) { activeFilter = d; renderFilters(); renderCourses(); }

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return COURSES.filter(c => {
    const matchDept = activeFilter === 'Zote' || c.dept === activeFilter;
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.dept.toLowerCase().includes(q);
    return matchDept && matchQ;
  });
}

function filterCourses() { renderCourses(); }

function toggleCard(id) {
  openCards.has(id) ? openCards.delete(id) : openCards.add(id);
  renderCourses();
}

function renderCourses() {
  const filtered = getFiltered();
  const list = document.getElementById('courseList');
  const empty = document.getElementById('emptyState');
  const stats = document.getElementById('statsBar');

  stats.innerHTML = `Inaonyesha kozi <span>${filtered.length}</span> kati ya ${COURSES.length}`;

  if (!filtered.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(c => {
    const isOpen = openCards.has(c.id);
    const semHTML = c.semesters.map(s => `
      <div class="semester-block">
        <div class="semester-label">${s.label}</div>
        ${s.subjects.map((sub, i) => `
          <div class="subject-row">
            <div class="subject-num">${i+1}</div>
            <div class="subject-dot"></div>
            <div class="subject-info">
              <div class="subject-name">${sub.name}</div>
              <div class="subject-code">${sub.code}</div>
            </div>
          </div>`).join('')}
      </div>`).join('');

    return `
    <div class="course-card${isOpen?' open':''}" id="card-${c.id}">
      <div class="card-summary" onclick="toggleCard(${c.id})">
        <div class="dept-icon dept-${c.dept}">${c.icon}</div>
        <div class="card-text">
          <span class="dept-badge dept-${c.dept}">${c.dept}</span>
          <div class="course-name">${c.name}</div>
          <div class="course-meta">
            <span class="meta-pill">📋 ${c.level}</span>
            <span class="meta-pill">⏱ ${c.duration}</span>
          </div>
        </div>
        <div class="chevron-wrap">
          <div class="chevron">
            <svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>
      <div class="subjects-panel">
        ${semHTML}
        <div class="entry-section">
          <div class="entry-title">📋 Masharti ya kujiunga</div>
          <div class="entry-text">${c.entry}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

renderFilters();
renderCourses();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
